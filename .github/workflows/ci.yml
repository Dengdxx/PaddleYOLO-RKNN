name: ci

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    name: format, lint, syntax, lfs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install development tools
        run: python -m pip install -r requirements-dev.txt

      - name: Check formatting
        run: ruff format --check .

      - name: Check critical lint
        run: ruff check .

      - name: Check Python syntax
        run: python -m compileall -q ddyolo26 tools scripts bench quant export train.py

      - name: Check version metadata
        run: |
          python - <<'PY'
          import ast
          import tomllib
          from pathlib import Path

          project = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          project_version = project["project"]["version"]

          module = ast.parse(Path("ddyolo26/version.py").read_text(encoding="utf-8"))
          code_version = None
          for node in module.body:
              if isinstance(node, ast.Assign):
                  for target in node.targets:
                      if isinstance(target, ast.Name) and target.id == "__version__":
                          code_version = ast.literal_eval(node.value)

          if project_version != code_version:
              raise SystemExit(f"version mismatch: pyproject={project_version}, code={code_version}")
          PY

      - name: Verify Git LFS weight pointers
        shell: bash
        run: |
          set -euo pipefail

          expected=20
          mapfile -t weights < <(git ls-files 'weights/**/*.pdparams')
          actual="${#weights[@]}"
          test "${actual}" -eq "${expected}"

          for weight in "${weights[@]}"; do
            attr="$(git check-attr filter -- "${weight}" | awk '{print $3}')"
            test "${attr}" = "lfs"
            git cat-file -p "HEAD:${weight}" | grep -q '^version https://git-lfs.github.com/spec/v1'
          done
