# COCO 2017 val-only dataset for ONNX/RKNN calibration and evaluation.
# This variant intentionally avoids downloading train2017 (19G).
# Expected prepared layout:
#   PaddleYOLO-RKNN/artifacts/coco/
#     ├── images/val2017/
#     ├── labels/val2017/
#     └── annotations/instances_val2017.json
#
# Preferred preparation entry:
#   python PaddleYOLO-RKNN/scripts/prepare_coco_baselines.py

path: ../../../artifacts/coco
train: images/val2017
