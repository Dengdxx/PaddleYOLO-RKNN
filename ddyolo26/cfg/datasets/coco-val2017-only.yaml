download: |
  from pathlib import Path
  from ddyolo26.utils import ASSETS_URL
  from ddyolo26.utils.downloads import download

  root = Path(yaml["path"])
  root.parent.mkdir(parents=True, exist_ok=True)

  # labels (segment labels also cover detect calibration)
  download([ASSETS_URL + "/coco2017labels-segments.zip"], dir=root.parent)

  # val images only
  download(["http://images.cocodataset.org/zips/val2017.zip"], dir=root / "images", threads=2)

  # official annotations for pycocotools eval
  download(["http://images.cocodataset.org/annotations/annotations_trainval2017.zip"], dir=root)
